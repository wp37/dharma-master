<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="description" content="TUAI Dharma Master - Bộ công cụ AI sáng tạo nội dung Phật giáo: phân tích video, viết kịch bản pháp thoại, tạo prompt hình ảnh & video chuyên nghiệp." />
    <meta name="theme-color" content="#060810" />
    <title>TUAI DHARMA MASTER - AI Buddhist Wisdom Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Be Vietnam Pro', 'Inter', 'sans-serif'],
              display: ['Cinzel', 'Be Vietnam Pro', 'serif'],
            },
            colors: {
              dharma: {
                bg: '#060810',
                surface: '#0a0e1a',
                card: '#0f1424',
                panel: '#111827',
                gold: '#D4A574',
                amber: '#E8C4A0',
                sacred: '#d4a574',
                teal: '#0d9488',
                'teal-light': '#2dd4bf',
                flame: '#e85d26',
                'flame-light': '#ff6b35',
                indigo: '#312e81',
                'indigo-deep': '#1e1b4b',
                text: '#ECE6D8',
                muted: '#94a3b8',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.6s cubic-bezier(0.22,1,0.36,1)',
              'slide-in': 'slideIn 0.5s cubic-bezier(0.22,1,0.36,1)',
              'sacred-glow': 'sacredGlow 2.5s ease-in-out infinite',
              'cosmic-float': 'cosmicFloat 5s ease-in-out infinite',
              'blur-in': 'blurIn 0.5s cubic-bezier(0.22,1,0.36,1)',
              'mandala-spin': 'mandalaSpin 12s linear infinite',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideIn: { '0%': { opacity: '0', transform: 'translateY(12px)', filter: 'blur(4px)' }, '100%': { opacity: '1', transform: 'translateY(0)', filter: 'blur(0)' } },
              sacredGlow: { '0%, 100%': { boxShadow: '0 0 8px rgba(13,148,136,0.15)' }, '50%': { boxShadow: '0 0 24px rgba(13,148,136,0.35)' } },
              cosmicFloat: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-6px)' } },
              blurIn: { '0%': { opacity: '0', filter: 'blur(8px)', transform: 'scale(0.97)' }, '100%': { opacity: '1', filter: 'blur(0)', transform: 'scale(1)' } },
              mandalaSpin: { '0%': { transform: 'rotate(0deg)' }, '100%': { transform: 'rotate(360deg)' } },
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="cosmic-particles">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
